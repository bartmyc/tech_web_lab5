<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Liczenie Urodzin</title>
  </head>
  <body class="bg-slate-50 flex items-center justify-center min-h-screen">

    <div class="bg-white p-8 rounded-xl shadow-md max-w-md w-full">
      <h1 class="text-2xl font-bold text-primary mb-6 text-center">Liczenie Urodzin</h1>
      
      <form id="birthdayForm" class="space-y-4">
        <div>
          <label for="birthDate" class="block text-sm font-medium text-gray-700 mb-1">Wybierz datę urodzenia:</label>
          <input 
            type="date" 
            id="birthDate" 
            required 
            class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-300"
          />
        </div>
        <button 
          type="submit" 
          class="w-full bg-blue-300 p-4 font-semibold rounded-md hover:bg-blue-400 transition-colors"
        >
          Oblicz
        </button>
      </form>
    </div>

    <dialog 
      id="resultDialog" 
      class="bg-gray-200 text-red-600 p-6 rounded-lg shadow-xl max-w-sm w-full backdrop:bg-black/50 relative"
    >
      <button 
        id="closeDialog" 
        class="absolute top-2 right-3 text-gray-600 hover:text-gray-900 font-bold text-lg"
      >
        &times;
      </button>
      
      <div id="dialogContent" class="mt-4 space-y-2 font-medium"></div>
    </dialog>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
