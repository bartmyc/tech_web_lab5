<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalkulator dni od urodzin</title>
  </head>
  <body class="min-h-screen bg-white p-8">
    <main class="mx-auto max-w-xl">
      <h1 class="text-2xl font-bold text-primary">
        Kalkulator dni od urodzin
      </h1>
      <form id="birth-form" class="mt-6 flex flex-col gap-4">
        <label for="birth" class="font-medium">
         Data urodzenia:
        </label>
        <input
          id="birth"
          name="birth"
          type="date"
          required
          class="rounded border border-gray-400 p-2"
        />
        <button
          type="submit"
          class="rounded bg-blue-300 p-4 font-medium hover:bg-blue-400"
        >
          Oblicz
        </button>
      </form>
      <dialog
        id="result"
        class="rounded bg-gray-200 p-6 text-red-600 backdrop:bg-black/40"
      >
        <button
          id="close"
          type="button"
          class="absolute right-3 top-2 font-bold text-black"
          aria-label="Zamknij okno"
        >
          x
        </button>
        <p id="message" class="pr-6"></p>
      </dialog>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
